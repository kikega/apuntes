<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ apunte.titulo }}</title>
    <style>
        @page { margin: 2cm; }
        body { font-family: 'Inter', sans-serif; font-size: 11pt; line-height: 1.6; color: #1e293b; }
        h1 { font-size: 22pt; border-bottom: 1px solid #ccc; padding-bottom: 4pt; }
        h2 { font-size: 18pt; margin-top: 14pt; }
        h3 { font-size: 14pt; margin-top: 12pt; }
        pre { background: #1e293b; color: #f8f8f2; padding: 10pt; border-radius: 4pt; font-size: 9pt; overflow-x: auto; }
        code { background: #f1f5f9; padding: 1pt 3pt; border-radius: 2pt; font-size: 9pt; }
        table { width: 100%; border-collapse: collapse; margin: 12pt 0; }
        th, td { padding: 6pt; border: 1px solid #ccc; }
        th { background: #f8fafc; }
        blockquote { border-left: 3pt solid #34A6F4; padding-left: 8pt; color: #64748b; }
        .meta { font-size: 9pt; color: #94a3b8; margin-bottom: 16pt; }
    </style>
</head>
<body>
    <h1>{{ apunte.titulo }}</h1>
    <div class="meta">{{ apunte.get_formato_display }} | {{ apunte.tiempo_lectura }} | {{ apunte.tema.familia.categoria.nombre }} › {{ apunte.tema.nombre }}</div>
    <div>{{ rendered }}</div>
</body>
</html>
